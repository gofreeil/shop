<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>צור קשר | חנות החירות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="images/logo.png">
<link rel="apple-touch-icon" href="images/logo.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="חנות החירות">
<meta property="og:title" content="צור קשר | חנות החירות">
<meta property="og:description" content="דברו איתנו - שאלות, הזמנות, שירות לקוחות">
<meta property="og:image" content="https://heirut-shop.vercel.app/images/logo.png">
<meta property="og:image:width" content="1024">
<meta property="og:image:height" content="1024">
<meta property="og:image:alt" content="לוגו חנות החירות">
<meta property="og:url" content="https://heirut-shop.vercel.app/contact">
<meta property="og:locale" content="he_IL">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="צור קשר | חנות החירות">
<meta name="twitter:description" content="דברו איתנו - שאלות, הזמנות, שירות לקוחות">
<meta name="twitter:image" content="https://heirut-shop.vercel.app/images/logo.png">
<meta name="theme-color" content="#6366f1">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo"><img src="images/logo.png" alt="חנות החירות"></a>
    <nav class="main-nav">
      <a href="index.html">בית</a>
      <a href="products.html">חנות</a>
      <a href="index.html#categories">קטגוריות</a>
      <a href="about.html">אודות</a>
      <a href="contact.html" class="active">צור קשר</a>
    </nav>
    <div class="header-actions">
      <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
      <a href="cart.html" class="icon-btn cart-btn"><i class="fas fa-shopping-bag"></i><span class="badge" id="cartCount">0</span></a>
    </div>
  </div>
</header>

<section class="page-header">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">בית</a> / צור קשר</div>
    <h1>נשמח לשמוע ממך</h1>
  </div>
</section>

<section class="section">
  <div class="container">
    <div style="display:grid;grid-template-columns:1fr 1.5fr;gap:48px">
      <div>
        <h2 style="font-size:28px;margin-bottom:24px">דרכי יצירת קשר</h2>
        <div style="display:grid;gap:20px">
          <div style="display:flex;gap:16px;align-items:flex-start;padding:20px;background:var(--bg-alt);border-radius:16px">
            <i class="fas fa-phone" style="font-size:24px;color:var(--primary)"></i>
            <div><strong>טלפון</strong><br><span style="color:var(--text-muted)">1-800-חנות החירות</span></div>
          </div>
          <div style="display:flex;gap:16px;align-items:flex-start;padding:20px;background:var(--bg-alt);border-radius:16px">
            <i class="fas fa-envelope" style="font-size:24px;color:var(--primary)"></i>
            <div><strong>אימייל</strong><br><span style="color:var(--text-muted)">info@no-shop.co.il</span></div>
          </div>
          <div style="display:flex;gap:16px;align-items:flex-start;padding:20px;background:var(--bg-alt);border-radius:16px">
            <i class="fab fa-whatsapp" style="font-size:24px;color:#25d366"></i>
            <div><strong>וואטסאפ</strong><br><span style="color:var(--text-muted)">052-1234567</span></div>
          </div>
          <div style="display:flex;gap:16px;align-items:flex-start;padding:20px;background:var(--bg-alt);border-radius:16px">
            <i class="fas fa-clock" style="font-size:24px;color:var(--primary)"></i>
            <div><strong>שעות פעילות</strong><br><span style="color:var(--text-muted)">א'-ה' 9:00-21:00, ו' 9:00-13:00</span></div>
          </div>
        </div>
      </div>
      <div>
        <form class="form-grid" onsubmit="handleContact(event)" style="background:var(--bg-card);padding:32px;border-radius:20px;border:1px solid var(--border)">
          <h2 style="font-size:24px">שלח לנו הודעה</h2>
          <div class="form-row">
            <div class="form-field"><label>שם מלא</label><input type="text" required></div>
            <div class="form-field"><label>אימייל</label><input type="email" required></div>
          </div>
          <div class="form-field"><label>טלפון</label><input type="tel"></div>
          <div class="form-field"><label>נושא</label>
            <select><option>שאלה כללית</option><option>בקשת החזרה</option><option>תמיכה טכנית</option><option>שיתוף פעולה</option></select>
          </div>
          <div class="form-field"><label>הודעה</label><textarea rows="6" required></textarea></div>
          <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> שלח הודעה</button>
        </form>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom" style="border:none">
      <p>© 2026 חנות החירות. כל הזכויות שמורות.</p>
    </div>
  </div>
</footer>

<div class="toast" id="toast"></div>
<script src="data/products.js"></script>
<script src="js/main.js"></script>
<script>
function handleContact(e) {
  e.preventDefault();
  toast('ההודעה נשלחה בהצלחה!', 'fa-check-circle');
  e.target.reset();
}
</script>
</body>
</html>
