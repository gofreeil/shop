<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קטגוריות | חנות החירות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo"><span class="logo-icon">ח</span><span class="logo-text">חנות החירות</span></a>
    <nav class="main-nav">
      <a href="index.html">בית</a>
      <a href="products.html">חנות</a>
      <a href="categories.html" class="active">קטגוריות</a>
      <a href="about.html">אודות</a>
      <a href="contact.html">צור קשר</a>
    </nav>
    <div class="header-actions">
      <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
      <a href="cart.html" class="icon-btn cart-btn"><i class="fas fa-shopping-bag"></i><span class="badge" id="cartCount">0</span></a>
    </div>
  </div>
</header>

<section class="page-header">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">בית</a> / קטגוריות</div>
    <h1>קטגוריות</h1>
    <p style="color:var(--text-muted);margin-top:8px">גלה את כל הקטגוריות שלנו</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="categories-grid" id="catsGrid"></div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom" style="border:none">
      <p>© 2026 חנות החירות. כל הזכויות שמורות.</p>
    </div>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script src="data/products.js"></script>
<script src="js/main.js"></script>
<script>
document.getElementById('catsGrid').innerHTML = categories.map(c => {
  const count = products.filter(p => p.category === c.id).length;
  return `
    <a href="products.html?category=${c.id}" class="category-card">
      <div class="category-icon" style="background: linear-gradient(135deg, ${c.color}, ${c.color}dd)">
        <i class="fas ${c.icon}"></i>
      </div>
      <h3>${c.name}</h3>
      <p>${c.desc}</p>
      <span class="count">${count} מוצרים <i class="fas fa-arrow-left"></i></span>
    </a>
  `;
}).join('');
</script>
</body>
</html>
